_target_: beginoi.benchmarks.paulsson_machine.PaulssonMachineBenchmark
name: paulsson_machine
grid_n1: 41
grid_n2: 41
seed: ${seed}

# Known target g(u): analytic difference-of-sigmoids ring in [0,1].
target:
  _target_: beginoi.benchmarks.paulsson_machine.TargetBandpass
  center: [0.55, 0.45]
  r_mid: 0.42
  thickness: 0.18
  width: 0.03

# Simulator family y_sim(u, theta) shares the same bandpass form but is controlled by theta.
simulator_width: 0.03
theta0: [0.35, 0.35, 0.35, 0.25]
theta_low: [0.10, 0.10, 0.05, 0.05]
theta_high: [0.90, 0.90, 0.85, 0.60]

# Synthetic sim-to-real mismatch (easy case: near-identity).
a_true: 1.02
b_true: -0.01
s_true: [1.00, 1.00]
t_true: [0.00, 0.00]

# Optional structured residual on real output.
residual_seed: 0
residual_num_features: 0
residual_lengthscale: 0.25
residual_weight_scale: 0.02

# Observation noise
noise_sigma: 0.01
heteroscedastic: false
hetero_scale: 0.0
